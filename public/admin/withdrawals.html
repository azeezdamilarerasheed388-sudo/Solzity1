<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solzity - Trade Crypto with 100x Leverage</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="bg-white shadow-sm">
        <div class="px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">Withdrawal Management</h1>
            <div class="space-x-2">
                <a href="/admin" class="bg-gray-200 px-4 py-2 rounded hover:bg-gray-300">Back</a>
                <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Logout</button>
            </div>
        </div>
    </div>

    <div class="p-6">
        <!-- Tabs -->
        <div class="flex space-x-2 mb-4">
            <button onclick="loadWithdrawals('pending')" class="tab-btn px-4 py-2 bg-blue-600 text-white rounded" data-tab="pending">
                Pending
            </button>
            <button onclick="loadWithdrawals('all')" class="tab-btn px-4 py-2 bg-gray-200 rounded" data-tab="all">
                All
            </button>
        </div>

        <!-- Withdrawals List -->
        <div id="withdrawalsList" class="bg-white rounded-lg shadow p-6">
            <div class="text-center py-8">Loading...</div>
        </div>
    </div>

    <!-- Decline Modal -->
    <div id="declineModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-lg p-6 max-w-md w-full">
            <h3 class="text-lg font-bold mb-4">Decline Withdrawal</h3>
            <p class="text-gray-600 mb-4">Are you sure you want to decline this withdrawal? The funds will be refunded to the user.</p>
            <div class="mb-4">
                <label class="block text-sm font-medium mb-2">Reason (Optional)</label>
                <textarea id="declineReason" class="w-full p-2 border rounded" rows="3" placeholder="Enter reason for declining..."></textarea>
            </div>
            <div class="flex space-x-2">
                <button onclick="confirmDecline()" class="flex-1 bg-red-600 text-white py-2 rounded hover:bg-red-700">
                    Confirm Decline
                </button>
                <button onclick="closeDeclineModal()" class="flex-1 bg-gray-200 py-2 rounded hover:bg-gray-300">
                    Cancel
                </button>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) {
            window.location.href = '/admin/login';
        }

        let currentWithdrawalId = null;

        async function loadWithdrawals(type = 'pending') {
            const container = document.getElementById('withdrawalsList');
            container.innerHTML = '<div class="text-center py-8">Loading...</div>';
            
            try {
                const endpoint = type === 'pending' 
                    ? '/api/withdrawals/admin/pending' 
                    : '/api/withdrawals/admin/all';
                
                console.log('Fetching:', endpoint);
                
                const res = await fetch(endpoint, {
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                if (!res.ok) {
                    throw new Error(`HTTP error ${res.status}`);
                }
                
                const data = await res.json();
                console.log('Withdrawals data:', data);
                
                if (!data.withdrawals || data.withdrawals.length === 0) {
                    container.innerHTML = '<div class="text-center py-8 text-gray-500">No withdrawals found</div>';
                    return;
                }

                let html = '<div class="space-y-4">';
                data.withdrawals.forEach(w => {
                    const date = new Date(w.created_at * 1000).toLocaleString();
                    const statusColors = {
                        'pending': 'bg-yellow-100 text-yellow-800',
                        'approved': 'bg-blue-100 text-blue-800',
                        'completed': 'bg-green-100 text-green-800',
                        'declined': 'bg-red-100 text-red-800',
                        'failed': 'bg-red-100 text-red-800'
                    };
                    const statusClass = statusColors[w.status] || 'bg-gray-100 text-gray-800';

                    html += `
                        <div class="border rounded-lg p-4 ${w.status === 'pending' ? 'border-yellow-400' : ''}">
                            <div class="flex justify-between items-start mb-3">
                                <div>
                                    <span class="px-2 py-1 rounded text-sm ${statusClass}">
                                        ${w.status}
                                    </span>
                                    <p class="font-medium mt-2">${w.email || 'Unknown'} (${w.username || 'No username'})</p>
                                    <p class="text-sm text-gray-500">${date}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-xl font-bold">${w.amount || 0} ${w.token || ''}</p>
                                    <p class="text-sm text-gray-500">Fee: ${w.fee || 0}</p>
                                    <p class="text-sm">Net: ${w.net_amount || 0}</p>
                                </div>
                            </div>
                            <p class="text-sm font-mono bg-gray-50 p-2 rounded mt-2 break-all">
                                To: ${w.to_address || 'N/A'}
                            </p>
                            ${w.status === 'pending' ? `
                                <div class="flex space-x-2 mt-3">
                                    <button onclick="processWithdrawal(${w.id})" 
                                            class="flex-1 bg-green-500 text-white px-4 py-2 rounded hover:bg-green-600">
                                        Approve
                                    </button>
                                    <button onclick="openDeclineModal(${w.id})" 
                                            class="flex-1 bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">
                                        Decline
                                    </button>
                                </div>
                            ` : w.tx_signature ? `
                                <p class="text-xs text-gray-500 mt-2">${w.tx_signature}</p>
                            ` : ''}
                        </div>
                    `;
                });
                html += '</div>';
                container.innerHTML = html;

                // Update active tab styling
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.classList.remove('bg-blue-600', 'text-white');
                    btn.classList.add('bg-gray-200');
                });
                document.querySelector(`[data-tab="${type}"]`).classList.add('bg-blue-600', 'text-white');
                
            } catch (error) {
                console.error('Error loading withdrawals:', error);
                container.innerHTML = `<div class="text-center py-8 text-red-600">Error loading withdrawals: ${error.message}</div>`;
            }
        }

        async function processWithdrawal(id) {
            if (!confirm('Approve this withdrawal? The transaction will be processed.')) return;

            try {
                const res = await fetch(`/api/withdrawals/admin/process/${id}`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await res.json();
                
                if (data.success) {
                    alert('Withdrawal approved successfully!');
                    loadWithdrawals('pending');
                } else {
                    alert('Error: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                alert('Error processing withdrawal: ' + error.message);
            }
        }

        function openDeclineModal(id) {
            currentWithdrawalId = id;
            document.getElementById('declineModal').classList.remove('hidden');
        }

        function closeDeclineModal() {
            document.getElementById('declineModal').classList.add('hidden');
            document.getElementById('declineReason').value = '';
            currentWithdrawalId = null;
        }

        async function confirmDecline() {
            if (!currentWithdrawalId) return;
            
            const reason = document.getElementById('declineReason').value;

            try {
                const res = await fetch(`/api/withdrawals/admin/decline/${currentWithdrawalId}`, {
                    method: 'POST',
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ reason })
                });

                const data = await res.json();
                
                if (data.success) {
                    alert('Withdrawal declined and funds refunded!');
                    closeDeclineModal();
                    loadWithdrawals('pending');
                } else {
                    alert('Error: ' + (data.error || 'Unknown error'));
                }
            } catch (error) {
                alert('Error declining withdrawal: ' + error.message);
            }
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/admin/login';
        }

        // Load pending withdrawals by default
        loadWithdrawals('pending');
    </script>
</body>
</html>
