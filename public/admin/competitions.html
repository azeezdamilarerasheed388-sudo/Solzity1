<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solzity - Trade Crypto with 100x Leverage</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="bg-white shadow-sm">
        <div class="px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">Manage Competitions</h1>
            <div class="space-x-2">
                <a href="/admin" class="bg-gray-200 px-4 py-2 rounded hover:bg-gray-300">Back</a>
                <button onclick="logout()" class="bg-red-500 text-white px-4 py-2 rounded hover:bg-red-600">Logout</button>
            </div>
        </div>
    </div>

    <div class="p-6">
        <!-- Create Competition Form -->
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-bold mb-4">➕ Create New Competition</h2>
            
            <form id="createForm" class="space-y-4">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Competition Name</label>
                        <input type="text" id="name" required class="w-full p-2 border rounded" placeholder="e.g., Weekend Warrior">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Description</label>
                        <input type="text" id="description" class="w-full p-2 border rounded" placeholder="Brief description">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Prize Pool (USDT)</label>
                        <input type="number" id="prizePool" value="1000" min="10" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Entry Fee (USDT)</label>
                        <input type="number" id="entryFee" value="10" min="0" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Max Participants</label>
                        <input type="number" id="maxParticipants" value="50" min="2" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Min Trades Required</label>
                        <input type="number" id="minTrades" value="3" min="1" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Start Time</label>
                        <select id="startOption" class="w-full p-2 border rounded mb-2" onchange="toggleStartTime()">
                            <option value="now">Start Now</option>
                            <option value="tomorrow">Tomorrow</option>
                            <option value="custom">Custom Date</option>
                        </select>
                        <div id="customStart" style="display: none;">
                            <input type="datetime-local" id="customStartTime" class="w-full p-2 border rounded">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Duration</label>
                        <select id="duration" class="w-full p-2 border rounded">
                            <option value="1">1 Day</option>
                            <option value="3" selected>3 Days</option>
                            <option value="7">7 Days</option>
                            <option value="14">14 Days</option>
                            <option value="30">30 Days</option>
                        </select>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Rules</label>
                    <textarea id="rules" rows="3" class="w-full p-2 border rounded" placeholder="Competition rules..."></textarea>
                </div>

                <div class="border-t pt-4">
                    <h3 class="font-semibold mb-3">🏆 Prize Distribution</h3>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">1st Place (%)</label>
                            <input type="number" id="firstPrize" value="50" min="0" max="100" class="w-full p-2 border rounded">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">2nd Place (%)</label>
                            <input type="number" id="secondPrize" value="30" min="0" max="100" class="w-full p-2 border rounded">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-2">3rd Place (%)</label>
                            <input type="number" id="thirdPrize" value="20" min="0" max="100" class="w-full p-2 border rounded">
                        </div>
                    </div>
                    <p class="text-xs text-gray-500 mt-2">Percentages should add up to 100%</p>
                </div>

                <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
                    Create Competition
                </button>
            </form>
        </div>

        <!-- Active Competitions List -->
        <div class="bg-white rounded-lg shadow p-6">
            <h2 class="text-xl font-bold mb-4">📋 Active Competitions</h2>
            
            <div class="flex space-x-2 mb-4">
                <button onclick="loadCompetitions('upcoming')" class="filter-btn px-4 py-2 bg-blue-600 text-white rounded" data-filter="upcoming">Upcoming</button>
                <button onclick="loadCompetitions('active')" class="filter-btn px-4 py-2 bg-gray-200 rounded" data-filter="active">Live</button>
                <button onclick="loadCompetitions('completed')" class="filter-btn px-4 py-2 bg-gray-200 rounded" data-filter="completed">Completed</button>
            </div>

            <div id="competitionsList" class="space-y-4">
                <div class="text-center py-8">Loading...</div>
            </div>
        </div>
    </div>

    <!-- Edit Competition Modal -->
    <div id="editModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-lg p-6 max-w-2xl w-full max-h-[90vh] overflow-y-auto">
            <h3 class="text-xl font-bold mb-4">✏️ Edit Competition</h3>
            <form id="editForm" class="space-y-4">
                <input type="hidden" id="editId">
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Name</label>
                        <input type="text" id="editName" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Description</label>
                        <input type="text" id="editDescription" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Prize Pool</label>
                        <input type="number" id="editPrizePool" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Entry Fee</label>
                        <input type="number" id="editEntryFee" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Start Time</label>
                        <input type="datetime-local" id="editStartTime" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">End Time</label>
                        <input type="datetime-local" id="editEndTime" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Min Trades</label>
                        <input type="number" id="editMinTrades" class="w-full p-2 border rounded">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Max Participants</label>
                        <input type="number" id="editMaxParticipants" class="w-full p-2 border rounded">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">Rules</label>
                    <textarea id="editRules" rows="3" class="w-full p-2 border rounded"></textarea>
                </div>

                <div class="flex space-x-2">
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded hover:bg-blue-700">
                        Save Changes
                    </button>
                    <button type="button" onclick="closeEditModal()" class="flex-1 bg-gray-200 py-2 rounded hover:bg-gray-300">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('adminToken');
        if (!token) window.location.href = '/admin/login';

        function toggleStartTime() {
            const option = document.getElementById('startOption').value;
            document.getElementById('customStart').style.display = option === 'custom' ? 'block' : 'none';
        }

        // Create competition
        document.getElementById('createForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Calculate start time
            let startTime;
            const option = document.getElementById('startOption').value;
            const now = Math.floor(Date.now() / 1000);

            if (option === 'now') {
                startTime = now;
            } else if (option === 'tomorrow') {
                startTime = now + (24 * 60 * 60);
            } else {
                const customDate = new Date(document.getElementById('customStartTime').value);
                startTime = Math.floor(customDate.getTime() / 1000);
            }

            // Calculate end time based on duration
            const durationDays = parseInt(document.getElementById('duration').value);
            const endTime = startTime + (durationDays * 24 * 60 * 60);

            // Calculate prize distribution
            const prizePool = parseFloat(document.getElementById('prizePool').value);
            const firstPct = parseFloat(document.getElementById('firstPrize').value) / 100;
            const secondPct = parseFloat(document.getElementById('secondPrize').value) / 100;
            const thirdPct = parseFloat(document.getElementById('thirdPrize').value) / 100;

            const prizes = [
                { rank: 1, amount: prizePool * firstPct },
                { rank: 2, amount: prizePool * secondPct },
                { rank: 3, amount: prizePool * thirdPct }
            ];

            const competitionData = {
                name: document.getElementById('name').value,
                description: document.getElementById('description').value,
                prize_pool: prizePool,
                entry_fee: parseFloat(document.getElementById('entryFee').value),
                start_time: startTime,
                end_time: endTime,
                min_trades: parseInt(document.getElementById('minTrades').value),
                max_participants: parseInt(document.getElementById('maxParticipants').value),
                rules: document.getElementById('rules').value,
                prizes: prizes
            };

            try {
                const res = await fetch('/api/competitions/admin/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(competitionData)
                });

                const data = await res.json();
                
                if (data.success) {
                    alert('✅ Competition created successfully!');
                    document.getElementById('createForm').reset();
                    loadCompetitions('upcoming');
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Failed to create competition');
            }
        });

        // Load competitions
        async function loadCompetitions(status) {
            try {
                let url = '/api/competitions';
                if (status === 'upcoming') url = '/api/competitions/upcoming';
                else if (status === 'active') url = '/api/competitions/active';
                
                const res = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                if (data.success) {
                    displayCompetitions(data.data, status);
                }

                // Update filter buttons
                document.querySelectorAll('.filter-btn').forEach(btn => {
                    btn.classList.remove('bg-blue-600', 'text-white');
                    btn.classList.add('bg-gray-200');
                });
                document.querySelector(`[data-filter="${status}"]`).classList.add('bg-blue-600', 'text-white');
                
            } catch (error) {
                console.error('Error loading competitions:', error);
            }
        }

        function displayCompetitions(competitions, status) {
            const container = document.getElementById('competitionsList');
            const now = Math.floor(Date.now() / 1000);
            
            if (!competitions || competitions.length === 0) {
                container.innerHTML = '<div class="text-center py-8 text-gray-500">No competitions found</div>';
                return;
            }

            let html = '';
            competitions.forEach(c => {
                const startDate = new Date(c.start_time * 1000).toLocaleString();
                const endDate = new Date(c.end_time * 1000).toLocaleString();
                const participants = c.participantCount || 0;
                
                let statusBadge = '';
                if (status === 'upcoming') statusBadge = '<span class="bg-yellow-100 text-yellow-800 px-2 py-1 rounded text-xs">⏳ Upcoming</span>';
                else if (status === 'active') statusBadge = '<span class="bg-green-100 text-green-800 px-2 py-1 rounded text-xs">🔴 Live</span>';
                else statusBadge = '<span class="bg-gray-100 text-gray-800 px-2 py-1 rounded text-xs">✅ Ended</span>';

                html += `
                    <div class="border rounded-lg p-4">
                        <div class="flex justify-between items-start mb-3">
                            <div>
                                <h3 class="font-bold text-lg">${c.name}</h3>
                                <p class="text-sm text-gray-600">${c.description || 'No description'}</p>
                            </div>
                            ${statusBadge}
                        </div>

                        <div class="grid grid-cols-2 md:grid-cols-4 gap-3 mb-3 text-sm">
                            <div>
                                <span class="text-gray-500">Prize Pool:</span>
                                <span class="font-bold ml-1">$${c.prize_pool}</span>
                            </div>
                            <div>
                                <span class="text-gray-500">Entry:</span>
                                <span class="font-bold ml-1">$${c.entry_fee}</span>
                            </div>
                            <div>
                                <span class="text-gray-500">Participants:</span>
                                <span class="font-bold ml-1">${participants}/${c.max_participants}</span>
                            </div>
                            <div>
                                <span class="text-gray-500">Min Trades:</span>
                                <span class="font-bold ml-1">${c.min_trades}</span>
                            </div>
                        </div>

                        <div class="text-xs text-gray-500 mb-3">
                            <div>📅 Start: ${startDate}</div>
                            <div>⏰ End: ${endDate}</div>
                        </div>

                        <div class="flex space-x-2">
                            <button onclick="editCompetition(${c.id})" 
                                    class="bg-blue-500 text-white px-3 py-1 rounded text-sm hover:bg-blue-600">
                                Edit
                            </button>
                            <button onclick="deleteCompetition(${c.id})" 
                                    class="bg-red-500 text-white px-3 py-1 rounded text-sm hover:bg-red-600">
                                Delete
                            </button>
                            ${status === 'active' ? `
                                <button onclick="endCompetitionEarly(${c.id})" 
                                        class="bg-yellow-500 text-white px-3 py-1 rounded text-sm hover:bg-yellow-600">
                                    End Early
                                </button>
                            ` : ''}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
        }

        // Edit competition
        async function editCompetition(id) {
            try {
                const res = await fetch(`/api/competitions/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                
                if (data.success) {
                    const c = data.data;
                    
                    document.getElementById('editId').value = c.id;
                    document.getElementById('editName').value = c.name;
                    document.getElementById('editDescription').value = c.description || '';
                    document.getElementById('editPrizePool').value = c.prize_pool;
                    document.getElementById('editEntryFee').value = c.entry_fee;
                    document.getElementById('editMinTrades').value = c.min_trades;
                    document.getElementById('editMaxParticipants').value = c.max_participants;
                    document.getElementById('editRules').value = c.rules || '';
                    
                    // Format dates for datetime-local
                    const startDate = new Date(c.start_time * 1000);
                    const endDate = new Date(c.end_time * 1000);
                    
                    document.getElementById('editStartTime').value = startDate.toISOString().slice(0, 16);
                    document.getElementById('editEndTime').value = endDate.toISOString().slice(0, 16);
                    
                    document.getElementById('editModal').classList.remove('hidden');
                }
            } catch (error) {
                console.error('Error loading competition:', error);
            }
        }

        // Save edit
        document.getElementById('editForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const id = document.getElementById('editId').value;
            
            const startTime = Math.floor(new Date(document.getElementById('editStartTime').value).getTime() / 1000);
            const endTime = Math.floor(new Date(document.getElementById('editEndTime').value).getTime() / 1000);

            const competitionData = {
                name: document.getElementById('editName').value,
                description: document.getElementById('editDescription').value,
                prize_pool: parseFloat(document.getElementById('editPrizePool').value),
                entry_fee: parseFloat(document.getElementById('editEntryFee').value),
                start_time: startTime,
                end_time: endTime,
                min_trades: parseInt(document.getElementById('editMinTrades').value),
                max_participants: parseInt(document.getElementById('editMaxParticipants').value),
                rules: document.getElementById('editRules').value
            };

            try {
                const res = await fetch(`/api/competitions/admin/${id}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(competitionData)
                });

                const data = await res.json();
                
                if (data.success) {
                    alert('✅ Competition updated successfully!');
                    closeEditModal();
                    loadCompetitions('upcoming');
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Failed to update competition');
            }
        });

        // Delete competition
        async function deleteCompetition(id) {
            if (!confirm('Are you sure you want to delete this competition?')) return;

            try {
                const res = await fetch(`/api/competitions/admin/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await res.json();
                
                if (data.success) {
                    alert('✅ Competition deleted');
                    loadCompetitions('upcoming');
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Failed to delete competition');
            }
        }

        // End competition early
        async function endCompetitionEarly(id) {
            if (!confirm('End this competition early? Winners will be calculated now.')) return;

            try {
                // This would need an API endpoint - you can add it later
                alert('Feature coming soon');
            } catch (error) {
                alert('Failed to end competition');
            }
        }

        function closeEditModal() {
            document.getElementById('editModal').classList.add('hidden');
        }

        function logout() {
            localStorage.removeItem('adminToken');
            window.location.href = '/admin/login';
        }

        // Load upcoming competitions by default
        loadCompetitions('upcoming');
    </script>
</body>
</html>
