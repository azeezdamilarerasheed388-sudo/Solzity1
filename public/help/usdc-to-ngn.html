<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solzity - Trade Crypto with 100x Leverage</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="bg-white shadow-sm sticky top-0 z-10">
        <div class="px-4 py-4 flex justify-between items-center max-w-4xl mx-auto">
            <a href="/" class="text-xl font-bold text-blue-600">Solzity</a>
            <a href="/support" class="text-blue-600">← Back</a>
        </div>
    </div>

    <div class="p-4 max-w-3xl mx-auto">
        <div class="bg-white rounded-2xl p-8 shadow-sm">
            <h1 class="text-3xl font-bold mb-4">How to Convert USDC to NGN</h1>

            <ol class="list-decimal pl-6 space-y-4">
                <li>
                    <p class="font-semibold">Go to NGN Wallet</p>
                </li>
                <li>
                    <p class="font-semibold">Click on "Sell USDC" tab</p>
                </li>
                <li>
                    <p class="font-semibold">Enter USDC amount</p>
                    <p class="text-gray-600">System shows how much NGN you'll receive</p>
                </li>
                <li>
                    <p class="font-semibold">Click "Sell" to confirm</p>
                </li>
            </ol>

            <div class="mt-6 p-4 bg-blue-50 rounded-xl">
                <p class="font-semibold">💱 Rate: Sell USDC at real rate (no spread)</p>
                <p class="text-sm mt-1">Example: 10 USDC → ₦15,000 (at ₦1,500 rate)</p>
            </div>
        </div>
    </div>
</body>
</html>
