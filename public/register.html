<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Solzity - Trade Crypto with 100x Leverage</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <h1 class="text-3xl font-bold text-center text-blue-600 mb-6">Create Account</h1>
        
        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" required class="w-full px-4 py-3 border rounded-xl">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" required class="w-full px-4 py-3 border rounded-xl">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" required minlength="6" class="w-full px-4 py-3 border rounded-xl">
            </div>
            <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold">
                Register
            </button>
        </form>
        
        <p class="mt-6 text-center">
            Already have an account? <a href="/login" class="text-blue-600">Login</a>
        </p>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    alert(`✅ Registration successful!\n\nYour deposit address (send SOL, USDC, USDT here):\n${data.depositAddress}`);
                    window.location.href = '/dashboard';
                } else {
                    alert('Registration failed: ' + data.error);
                }
            } catch (error) {
                alert('Registration failed');
            }
        });
    </script>
</body>
</html>
