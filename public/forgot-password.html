<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Solzity - Trade Crypto with 100x Leverage</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <div class="flex justify-center mb-6">
            <span class="bg-blue-100 text-blue-700 px-4 py-2 rounded-full text-sm font-medium">
                🔐 Password Reset
            </span>
        </div>
        
        <h1 class="text-3xl font-bold text-center text-blue-600 mb-2">Forgot Password?</h1>
        <p class="text-gray-600 text-center mb-8">Enter your email and we'll send you a reset link</p>
        
        <div id="emailForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                <input type="email" id="email" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none">
            </div>
            
            <button onclick="sendResetLink()" id="sendBtn" 
                    class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 transition">
                Send Reset Link
            </button>
            
            <p class="text-center">
                <a href="/login-enhanced" class="text-blue-600 text-sm hover:underline">
                    ← Back to Login
                </a>
            </p>
        </div>
        
        <div id="successMessage" class="hidden text-center py-8">
            <div class="text-6xl mb-4">📧</div>
            <h2 class="text-2xl font-bold text-green-600 mb-2">Check Your Email</h2>
            <p class="text-gray-600 mb-4">
                If your email exists in our system, you will receive a password reset link.
            </p>
            <p class="text-sm text-gray-500">
                Didn't receive it? Check your spam folder or 
                <button onclick="resetForm()" class="text-blue-600 hover:underline">try again</button>
            </p>
        </div>
    </div>

    <script>
        async function sendResetLink() {
            const email = document.getElementById('email').value;
            const sendBtn = document.getElementById('sendBtn');
            
            if (!email) {
                alert('Please enter your email');
                return;
            }
            
            sendBtn.disabled = true;
            sendBtn.textContent = 'Sending...';
            
            try {
                const res = await fetch('/api/password-reset/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    document.getElementById('emailForm').classList.add('hidden');
                    document.getElementById('successMessage').classList.remove('hidden');
                } else {
                    alert('Error: ' + data.error);
                    sendBtn.disabled = false;
                    sendBtn.textContent = 'Send Reset Link';
                }
            } catch (error) {
                alert('Failed to send reset link');
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send Reset Link';
            }
        }
        
        function resetForm() {
            document.getElementById('emailForm').classList.remove('hidden');
            document.getElementById('successMessage').classList.add('hidden');
            document.getElementById('email').value = '';
            document.getElementById('sendBtn').disabled = false;
            document.getElementById('sendBtn').textContent = 'Send Reset Link';
        }
    </script>
</body>
</html>
