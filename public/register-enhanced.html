<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Solzity - Trade Crypto with 100x Leverage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .strength-bar {
            height: 4px;
            transition: all 0.3s;
            border-radius: 2px;
        }
        .strength-weak { background: #ef4444; width: 25%; }
        .strength-medium { background: #f59e0b; width: 50%; }
        .strength-strong { background: #10b981; width: 100%; }
        .requirement-met { color: #10b981; text-decoration: line-through; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-2xl shadow-xl p-8 w-full max-w-md">
        <div class="flex justify-center mb-6">
            <span class="bg-blue-100 text-blue-700 px-4 py-2 rounded-full text-sm font-medium">
                ✉️ Email Verification Required
            </span>
        </div>
        
        <h1 class="text-3xl font-bold text-center text-blue-600 mb-2">Create Account</h1>
        <p class="text-gray-600 text-center mb-8">Secure registration with email verification</p>
        
        <form id="registerForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                <input type="text" id="username" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" id="email" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                <input type="password" id="password" required 
                       class="w-full px-4 py-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-blue-500"
                       oninput="checkPasswordStrength()">
                
                <!-- Password strength bar -->
                <div class="mt-2 h-1 bg-gray-200 rounded overflow-hidden">
                    <div id="strengthBar" class="strength-bar"></div>
                </div>
                
                <!-- Password requirements -->
                <div class="mt-3 text-xs space-y-1 text-gray-600">
                    <p id="reqLength" class="flex items-center">
                        <span class="mr-2">•</span> At least 8 characters
                    </p>
                    <p id="reqUpper" class="flex items-center">
                        <span class="mr-2">•</span> One uppercase letter
                    </p>
                    <p id="reqLower" class="flex items-center">
                        <span class="mr-2">•</span> One lowercase letter
                    </p>
                    <p id="reqNumber" class="flex items-center">
                        <span class="mr-2">•</span> One number
                    </p>
                    <p id="reqSpecial" class="flex items-center">
                        <span class="mr-2">•</span> One special character
                    </p>
                </div>
            </div>
            
            <button type="submit" id="submitBtn" disabled
                    class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold opacity-50 cursor-not-allowed">
                Create Account
            </button>
        </form>
        
        <p class="mt-6 text-center text-gray-600">
            Already have an account? 
            <a href="/login-enhanced" class="text-blue-600 font-semibold hover:underline">Login</a>
        </p>
    </div>

    <script>
        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            
            const checks = {
                length: password.length >= 8,
                upper: /[A-Z]/.test(password),
                lower: /[a-z]/.test(password),
                number: /\d/.test(password),
                special: /[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]/.test(password)
            };
            
            // Update requirement display
            document.getElementById('reqLength').className = checks.length ? 'requirement-met' : '';
            document.getElementById('reqUpper').className = checks.upper ? 'requirement-met' : '';
            document.getElementById('reqLower').className = checks.lower ? 'requirement-met' : '';
            document.getElementById('reqNumber').className = checks.number ? 'requirement-met' : '';
            document.getElementById('reqSpecial').className = checks.special ? 'requirement-met' : '';
            
            // Calculate strength
            const metCount = Object.values(checks).filter(Boolean).length;
            const bar = document.getElementById('strengthBar');
            
            if (metCount <= 2) {
                bar.className = 'strength-bar strength-weak';
            } else if (metCount <= 4) {
                bar.className = 'strength-bar strength-medium';
            } else {
                bar.className = 'strength-bar strength-strong';
            }
            
            // Enable submit if all requirements met
            const submitBtn = document.getElementById('submitBtn');
            if (metCount === 5) {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            } else {
                submitBtn.disabled = true;
                submitBtn.classList.add('opacity-50', 'cursor-not-allowed');
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = document.getElementById('submitBtn');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating Account...';
            
            try {
                const res = await fetch('/api/enhanced-auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        referralCode: localStorage.getItem("referralCode") || null, username, email, password })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('tempEmail', email);
                    window.location.href = '/verify-email';
                } else {
                    alert(data.errors ? data.errors.join('\n') : data.error);
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Create Account';
                }
            } catch (error) {
                alert('Registration failed');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        });
    </script>
</body>
</html>

<script>
    // Get referral code from URL
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        const ref = urlParams.get('ref');
        if (ref) {
            localStorage.setItem('referralCode', ref);
            
            // Add hidden input if not exists
            let refInput = document.getElementById('referralInput');
            if (!refInput) {
                refInput = document.createElement('input');
                refInput.type = 'hidden';
                refInput.id = 'referralInput';
                refInput.name = 'referralCode';
                document.getElementById('registerForm').appendChild(refInput);
            }
            refInput.value = ref;
        }
    })();
</script>
